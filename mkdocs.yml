# @format

site_name: VibeBlocks
site_description: Lightweight Python workflow orchestration library for AI agents, async task execution, retries, and failure-safe automation.
site_url: https://vibeblocks.aadigitalbusiness.com
repo_url: https://github.com/AADigitalBusiness/vibeblocks
repo_name: AADigitalBusiness/vibeblocks
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  custom_dir: custom

extra_css:
  - stylesheets/vibeblocks.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Docs Index: 00-index.md
  - Fundamentals:
      - Introduction: 01-introduction.md
      - Getting Started: 02-getting-started.md
      - Core Concepts: 03-core-concepts.md
  - Technical Deep-Dives:
      - Execution Runtime: 04-execution-runtime.md
      - Failure & Compensation: 05-failure-and-compensation.md
      - Nested Flows: 05.1-nested-flows.md
      - AI & Dynamic Flows: 06-ai-dynamic-flows.md
  - Reference & Evaluation:
      - API Quick Reference: 07-quick-reference-api.md
      - Glossary: 08-glossary.md
      - Strategic Evaluation: 09-strategic-evaluation.md
  - Community & Contribution:
      - Contributor Guide: 10-contributor-guide.md
      - Production Best Practices: 11-production-best-practices.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AADigitalBusiness/vibeblocks
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/vibeblocks/

copyright: Copyright &copy; 2026 AA Digital Business
